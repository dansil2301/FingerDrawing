version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ai-backend
    restart: always

  frontend-builder:
    build: ./frontend
    command: sh -c "npm install && npm run build"
    volumes:
      - ./frontend:/app
      - ./frontend/build:/app/build

  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/build:/usr/share/nginx/html
    depends_on:
      - backend