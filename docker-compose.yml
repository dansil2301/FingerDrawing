services:
  backend:
    build: ./Backend
    container_name: ai-backend
    restart: always

  # frontend-builder:
  #   build: ./Frontend
  #   command: sh -c "npm install && npm run build"
  #   volumes:
  #     - ./Frontend:/app
  #     - ./Frontend/build:/app/build
  #   restart: "no"

  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/build:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend-builder